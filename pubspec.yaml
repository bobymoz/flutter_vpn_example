name: vpnlab
description: App VPN de Clique e Conecte.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0" # Atualizado para exigir Dart 3
  
dependencies:
  flutter:
    sdk: flutter
  flutter_spinkit: ^8.1.0 # Atualizado para a versão mais recente
  flutter_vpn: ^0.13.0 # Atualizado para a versão que o Codemagic pediu
  animator: ^3.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/map-pattern.png
    - assets/tr.png
    - assets/us.png
    - assets/uk.png
    - assets/ger.png
    - assets/fr.png
    - assets/can.png
    - assets/net.png
    - assets/sing.png
    - assets/performance.png
    - assets/turbo.png

  fonts:
    - family: Montserrat-Bold
      fonts:
        - asset: assets/Montserrat-Bold.ttf

    - family: Montserrat-Medium
      fonts:
        - asset: assets/Montserrat-Medium.ttf

    - family: Montserrat-SemiBold
      fonts:
        - asset: assets/Montserrat-SemiBold.ttf
