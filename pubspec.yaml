name: nocix
description: Nocix VPN Professional
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  wireguard_flutter: ^0.1.3
  openvpn_flutter: ^1.3.1   
  unity_ads_plugin: ^0.3.1
  file_picker: ^8.0.0
  url_launcher: ^6.2.5     
  http: ^1.2.0         
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# CONFIGURAÇÃO CORRIGIDA: APENAS A IMAGEM ORIGINAL, SEM CORTES
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/LOGO.png"

flutter:
  uses-material-design: true
  assets:
    - assets/LOGO.png
    - assets/FUNDO.png
    - assets/us.png
