workflows:
  android-workflow:
    name: Jinoca VPN - Build Android
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Instalar as dependências do Flutter
        script: |
          flutter pub get
      - name: Compilar APK (Para você testar no celular)
        script: |
          flutter build apk --release --obfuscate --split-debug-info=./build/app/outputs/symbols --split-per-abi
      - name: Compilar AAB (Para a Google Play Store)
        script: |
          flutter build appbundle --release --obfuscate --split-debug-info=./build/app/outputs/symbols
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
      - build/app/outputs/bundle/release/**/*.aab
    publishing:
      email:
        recipients:
          - seu_email@gmail.com # Troque para o seu email aqui
        notify:
          success: true
          failure: true
