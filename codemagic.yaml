workflows:
  android-workflow:
    name: Nocix VPN - Build Android
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Instalar as dependências do Flutter
        script: |
          flutter pub get
          
      - name: Gerar Ícone e Splash Screen do Nocix
        script: |
          flutter pub run flutter_launcher_icons
          
      - name: Compilar APK Leve (Para testar no celular)
        script: |
          flutter build apk --release --obfuscate --split-debug-info=./build/app/outputs/symbols --split-per-abi
          
      - name: Compilar AAB Profissional (Para a Google Play)
        script: |
          flutter build appbundle --release --obfuscate --split-debug-info=./build/app/outputs/symbols
          
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
      - build/app/outputs/bundle/release/**/*.aab
    publishing:
      email:
        recipients:
          - seu_email@gmail.com # Troque para o seu e-mail aqui
        notify:
          success: true
          failure: true
